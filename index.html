<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aspirant Exam Countdown</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #121212;
      --panel-border: #222222;
      --text: #f7f7f7;
      --muted: #8a8f97;
      --accent: #ff3355;
      --accent-soft: rgba(255, 51, 85, 0.16);
      --shadow: 0 18px 70px rgba(0, 0, 0, 0.55);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
    }

    body {
      display: grid;
      place-items: center;
      padding: 2rem;
      position: relative;
    }

    .frame {
      width: min(94vw, 1180px);
      height: min(94vh, 820px);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: linear-gradient(135deg, #131313, var(--panel));
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(255, 51, 85, 0.14), transparent 24%),
                        radial-gradient(circle at 80% 80%, rgba(255, 51, 85, 0.08), transparent 28%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      user-select: none;
      width: min(94%, 920px);
    }

    .display-grid {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 1.2rem;
    }

    .time-block {
      min-width: 145px;
      padding: 1rem 1.05rem;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.025);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .time-value {
      color: var(--accent);
      font-size: clamp(2rem, 7vw, 3.4rem);
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 18px rgba(255, 51, 85, 0.22);
    }

    .time-label {
      margin-top: 0.45rem;
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status {
      font-size: 0.92rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.25s ease;
    }

    body.expired .time-value,
    body.expired .status {
      color: var(--accent);
    }

    .control-wrap {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      padding: 0.8rem 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.2);
    }

    .btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
    }

    .btn.primary {
      background: linear-gradient(135deg, #ff4466, var(--accent));
      border-color: transparent;
      color: white;
    }

    .picker-row {
      margin-top: 1.2rem;
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.35rem;
      min-width: 220px;
    }

    .field label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input[type="datetime-local"] {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 0.8rem 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .field input[type="datetime-local"]:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.06);
    }

    .message {
      min-height: 1.2rem;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--accent);
    }

    .message.error {
      color: #ff6b7a;
    }

    @media (max-width: 760px) {
      body { padding: 1rem; }
      .display-grid { gap: 0.5rem; }
      .time-block { min-width: 110px; padding: 0.8rem 0.7rem; }
      .field { min-width: 100%; }
      .control-wrap { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="content">
      <div class="display-grid">
        <div class="time-block"><div id="daysValue" class="time-value">00</div><div class="time-label">Days</div></div>
        <div class="time-block"><div id="hoursValue" class="time-value">00</div><div class="time-label">Hours</div></div>
        <div class="time-block"><div id="minutesValue" class="time-value">00</div><div class="time-label">Minutes</div></div>
        <div class="time-block"><div id="secondsValue" class="time-value">00</div><div class="time-label">Seconds</div></div>
      </div>

      <div id="status" class="status">READY TO START</div>

      <div class="picker-row">
        <div class="field">
          <label for="targetDate">Exam / Target Date</label>
          <input id="targetDate" type="datetime-local" />
        </div>
      </div>

      <div class="control-wrap">
        <button id="startBtn" class="btn primary" type="button">Start Countdown</button>
        <button id="pauseBtn" class="btn" type="button">Pause</button>
        <button id="resetBtn" class="btn" type="button">Reset</button>
      </div>

      <div id="message" class="message" aria-live="polite"></div>
    </div>
  </div>

  <audio id="alarm" loop preload="auto">
    <source src="https://www.soundjay.com/buttons/button-16.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const STORAGE_KEYS = {
      targetTime: "aspirant-exam-target-time",
      runningState: "aspirant-exam-running-state"
    };

    const daysValueEl = document.getElementById("daysValue");
    const hoursValueEl = document.getElementById("hoursValue");
    const minutesValueEl = document.getElementById("minutesValue");
    const secondsValueEl = document.getElementById("secondsValue");
    const statusEl = document.getElementById("status");
    const targetDateEl = document.getElementById("targetDate");
    const startBtnEl = document.getElementById("startBtn");
    const pauseBtnEl = document.getElementById("pauseBtn");
    const resetBtnEl = document.getElementById("resetBtn");
    const messageEl = document.getElementById("message");
    const alarmEl = document.getElementById("alarm");

    let timerIntervalId = null;
    let targetTime = null;
    let isRunning = false;
    let pausedRemainingMs = 0;

    function getStoredValue(key) {
      try {
        return localStorage.getItem(key);
      } catch (error) {
        return null;
      }
    }

    function setStoredValue(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch (error) {
        console.warn("Storage unavailable", error);
      }
    }

    function removeStoredValue(key) {
      try {
        localStorage.removeItem(key);
      } catch (error) {
        console.warn("Storage unavailable", error);
      }
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function stopAlarm() {
      alarmEl.pause();
      alarmEl.currentTime = 0;
    }

    function setMessage(text, isError = false) {
      messageEl.textContent = text;
      messageEl.classList.toggle("error", isError);
    }

    function updateButtonState() {
      startBtnEl.disabled = isRunning;
      pauseBtnEl.disabled = !isRunning;
    }

    function renderDisplay(totalMs) {
      const safeMs = Math.max(0, totalMs);
      const totalSeconds = Math.floor(safeMs / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      daysValueEl.textContent = pad(days);
      hoursValueEl.textContent = pad(hours);
      minutesValueEl.textContent = pad(minutes);
      secondsValueEl.textContent = pad(seconds);
    }

    function renderReady() {
      renderDisplay(0);
      statusEl.textContent = "READY TO START";
      document.body.classList.remove("expired", "running");
      isRunning = false;
      updateButtonState();
    }

    function renderExpired() {
      renderDisplay(0);
      statusEl.textContent = "TIME EXPIRED";
      document.body.classList.add("expired");
      document.body.classList.remove("running");
      isRunning = false;
      updateButtonState();
      if (alarmEl.paused) {
        alarmEl.play().catch(() => {});
      }
    }

    function renderFromTarget(endTime) {
      const remainingMs = endTime - Date.now();
      if (remainingMs <= 0) {
        renderExpired();
        return false;
      }

      renderDisplay(remainingMs);
      statusEl.textContent = "COUNTING DOWN";
      document.body.classList.remove("expired");
      document.body.classList.add("running");
      return true;
    }

    function stopLoop() {
      if (timerIntervalId) {
        clearInterval(timerIntervalId);
        timerIntervalId = null;
      }
    }

    function startLoop(endTime) {
      stopLoop();
      timerIntervalId = window.setInterval(() => {
        if (!renderFromTarget(endTime)) {
          stopLoop();
          isRunning = false;
          updateButtonState();
        }
      }, 1000);
    }

    function startCountdown() {
      const rawValue = targetDateEl.value;
      if (!rawValue) {
        setMessage("Please choose a target date and time.", true);
        return;
      }

      const chosenTime = new Date(rawValue).getTime();
      const now = Date.now();
      if (Number.isNaN(chosenTime) || chosenTime <= now) {
        setMessage("Please select a future date and time.", true);
        return;
      }

      targetTime = chosenTime;
      pausedRemainingMs = chosenTime - now;
      isRunning = true;
      setStoredValue(STORAGE_KEYS.targetTime, String(chosenTime));
      setStoredValue(STORAGE_KEYS.runningState, "1");
      stopAlarm();
      closeMessage();
      renderFromTarget(chosenTime);
      updateButtonState();
      startLoop(chosenTime);
    }

    function pauseCountdown() {
      if (!isRunning || !targetTime) return;
      stopLoop();
      pausedRemainingMs = Math.max(0, targetTime - Date.now());
      isRunning = false;
      statusEl.textContent = "PAUSED";
      renderDisplay(pausedRemainingMs);
      updateButtonState();
      setMessage("Countdown paused.");
    }

    function resetCountdown() {
      stopLoop();
      stopAlarm();
      removeStoredValue(STORAGE_KEYS.targetTime);
      removeStoredValue(STORAGE_KEYS.runningState);
      targetTime = null;
      pausedRemainingMs = 0;
      isRunning = false;
      targetDateEl.value = "";
      renderReady();
      updateButtonState();
      setMessage("Countdown reset.");
    }

    function closeMessage() {
      setMessage("");
    }

    function initializeFromStorage() {
      const storedTarget = getStoredValue(STORAGE_KEYS.targetTime);
      const isStoredRunning = getStoredValue(STORAGE_KEYS.runningState) === "1";
      if (storedTarget && isStoredRunning) {
        const parsedTarget = Number(storedTarget);
        if (!Number.isNaN(parsedTarget) && parsedTarget > Date.now()) {
          targetTime = parsedTarget;
          isRunning = true;
          renderFromTarget(parsedTarget);
          updateButtonState();
          startLoop(parsedTarget);
          return;
        }
      }

      renderReady();
      if (storedTarget) {
        const parsedTarget = Number(storedTarget);
        if (!Number.isNaN(parsedTarget)) {
          const localValue = new Date(parsedTarget).toISOString().slice(0, 16);
          targetDateEl.value = localValue;
        }
      }
    }

    startBtnEl.addEventListener("click", startCountdown);
    pauseBtnEl.addEventListener("click", pauseCountdown);
    resetBtnEl.addEventListener("click", resetCountdown);

    window.addEventListener("focus", () => {
      if (targetTime) {
        renderFromTarget(targetTime);
      }
    });

    document.addEventListener("DOMContentLoaded", initializeFromStorage);
  </script>
</body>
</html>
